<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Attendance - EduBridge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
  
  <aside class="glass-panel sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-graduation-cap"></i>
      <span>EduBridge</span>
    </div>
    <ul class="nav-links">
      <li><a href="faculty_dashboard.html"><i class="fa-solid fa-house"></i> Faculty Dashboard</a></li>
      <li><a href="faculty_attendance.html"><i class="fa-solid fa-clipboard-user"></i> Manage Attendance</a></li>
      <li><a href="faculty_leave.html"><i class="fa-solid fa-envelope-open-text"></i> Leave Approvals</a></li>
      <li><a href="faculty_chat.html"><i class="fa-solid fa-comments"></i> Student Queries</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <header class="header">
      <div>
        <h1>Update Class Attendance</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Record daily attendance for all subjects.</p>
      </div>
      <div class="user-profile">
        <div class="avatar"><i class="fa-solid fa-chalkboard-user"></i></div>
        <span class="username-display" style="font-weight: 500;"></span>
        <button onclick="logout()" class="btn-primary" style="margin-left: 15px; padding: 8px 16px;">Logout</button>
      </div>
    </header>

    <div class="glass-panel" style="padding: 20px; margin-bottom: 24px;">
      <h2 style="font-size: 16px; margin-bottom: 12px; color: var(--text-muted);">Add New Subject</h2>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="newSub" placeholder="Subject Name" style="max-width: 300px;">
        <button onclick="addSubject()" class="btn-primary" style="padding: 10px 20px;">Add Attendance Tab</button>
      </div>
    </div>

    <div class="glass-panel table-container">
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Attended</th>
            <th>Total Classes</th>
            <th>Calculated %</th>
          </tr>
        </thead>
        <tbody id="fac-attendance-body">
            <!-- Data populated by JS -->
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
