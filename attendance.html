<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - EduBridge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
  
  <aside class="glass-panel sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-graduation-cap"></i>
      <span>EduBridge</span>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
      <li><a href="attendance.html"><i class="fa-solid fa-clipboard-user"></i> Attendance</a></li>
      <li><a href="leave.html"><i class="fa-solid fa-envelope-open-text"></i> Leave</a></li>
      <li><a href="chat.html"><i class="fa-solid fa-comments"></i> Mentor Chat</a></li>
      <li><a href="report.html"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
    </ul>
  </aside>

  <main class="main-content">
    
    <header class="header">
      <div>
        <h1>Attendance Tracking</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Manage your daily subject-wise attendance.</p>
      </div>
      <div class="user-profile">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <span class="username-display" style="font-weight: 500;"></span>
        <button onclick="logout()" class="btn-primary" style="margin-left: 15px; padding: 8px 16px;">Logout</button>
      </div>
    </header>

    <div class="glass-panel table-container">
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Attended</th>
            <th>Total Classes</th>
            <th>Status / %</th>
          </tr>
        </thead>
        <tbody id="attendance-body">
            <!-- Data populated by JS -->
        </tbody>
      </table>
    </div>

    <div class="glass-panel" style="margin-top:20px; padding:20px; display:inline-block;">
        <h3 style="color: var(--text-muted); font-size:14px; margin-bottom:5px;">Overall Aggregate</h3>
        <p style="font-size: 28px; font-weight: 700; color: var(--success);" id="overall-att">Loading...</p>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
